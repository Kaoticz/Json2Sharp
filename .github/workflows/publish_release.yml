name: "Publish Release"

on:
  release:
    types: ["published"]

env:
  DOTNET_VERSIONS: |
    9.x
    10.x
  TARGET_FRAMEWORK: "net10.0"
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  publish_windows:
    runs-on: windows-latest
    env:
      WORK_DIR_PATH: ${{ github.RUNNER_TEMP }}

    steps:
      - name: "Checkout"
        uses: "actions/checkout@v4"

      - name: "Setup .NET"
        uses: "actions/setup-dotnet@v4"
        with:
          dotnet-version: ${{ env.DOTNET_VERSIONS }}

      - name: Build
        run: dotnet build -c Release

      - name: Test
        run: dotnet test -c Release

      - name: Publish
        run: |
          cd .\Json2SharpApp\
          dotnet publish --self-contained -c Release -f ${{ env.TARGET_FRAMEWORK }} -r win-x64 -o "$env:WORK_DIR_PATH\build\Json2Sharp_win-x64"
          dotnet publish --self-contained -c Release -f ${{ env.TARGET_FRAMEWORK }} -r win-arm64 -o "$env:WORK_DIR_PATH\build\Json2Sharp_win-arm64"
          cd ..\

      - name: Package
        run: |
          New-Item -ItemType Directory -Path "$env:WORK_DIR_PATH\zips"
          Compress-Archive -Path "$env:WORK_DIR_PATH\build\Json2Sharp_win-x64" -DestinationPath "$env:WORK_DIR_PATH\zips\Json2Sharp_win-x64.zip"
          Compress-Archive -Path "$env:WORK_DIR_PATH\build\Json2Sharp_win-arm64" -DestinationPath "$env:WORK_DIR_PATH\zips\Json2Sharp_win-arm64.zip"

      - name: "Upload Packages To Github Release"
        uses: "ncipollo/release-action@v1.14.0"
        with:
          allowUpdates: true
          artifactErrorsFailBuild: true
          artifacts: ${{ env.WORK_DIR_PATH }}\zips\*
          token: ${{ secrets.REPO_GITHUB_TOKEN }}
          tag: ${{ github.event.release.tag_name }}
          omitBodyDuringUpdate: true
          omitNameDuringUpdate: true

  publish_linux:
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout"
        uses: "actions/checkout@v4"

      - name: "Setup .NET"
        uses: "actions/setup-dotnet@v4"
        with:
          dotnet-version: ${{ env.DOTNET_VERSIONS }}

      - name: Build
        run: dotnet build -c Release

      - name: Test
        run: dotnet test -c Release

      - name: Publish
        run: |
          cd ./Json2SharpApp
          dotnet publish --self-contained -c Release -f ${{ env.TARGET_FRAMEWORK }} -r linux-x64 -o ~/build/Json2Sharp_linux-x64
          dotnet publish --self-contained -c Release -f ${{ env.TARGET_FRAMEWORK }} -r linux-arm64 -o ~/build/Json2Sharp_linux-arm64
          cd ../

      - name: Package
        run: |
          mkdir -p ~/zips
          cd ~/build
          zip -r9 ~/zips/Json2Sharp_linux-x64.zip ./Json2Sharp_linux-x64
          zip -r9 ~/zips/Json2Sharp_linux-arm64.zip ./Json2Sharp_linux-arm64

      - name: "Upload Packages To Github Release"
        uses: "ncipollo/release-action@v1.14.0"
        with:
          allowUpdates: true
          artifactErrorsFailBuild: true
          artifacts: "~/zips/*"
          token: ${{ secrets.REPO_GITHUB_TOKEN }}
          tag: ${{ github.event.release.tag_name }}
          omitBodyDuringUpdate: true
          omitNameDuringUpdate: true

  publish_macos:
    runs-on: macos-latest
    steps:
      - name: "Checkout"
        uses: "actions/checkout@v4"

      - name: "Setup .NET"
        uses: "actions/setup-dotnet@v4"
        with:
          dotnet-version: ${{ env.DOTNET_VERSIONS }}

      - name: Build
        run: dotnet build -c Release

      - name: Test
        run: dotnet test -c Release

      - name: Publish
        run: |
          cd ./Json2SharpApp
          dotnet publish --self-contained -c Release -f ${{ env.TARGET_FRAMEWORK }} -r osx-x64 -o ~/build/Json2Sharp_osx-x64
          dotnet publish --self-contained -c Release -f ${{ env.TARGET_FRAMEWORK }} -r osx-arm64 -o ~/build/Json2Sharp_osx-arm64
          cd ../

      - name: Package
        run: |
          mkdir -p ~/zips
          cd ~/build
          zip -r9 ~/zips/Json2Sharp_osx-x64.zip ./Json2Sharp_osx-x64
          zip -r9 ~/zips/Json2Sharp_osx-arm64.zip ./Json2Sharp_osx-arm64

      - name: "Upload Packages To Github Release"
        uses: "ncipollo/release-action@v1.14.0"
        with:
          allowUpdates: true
          artifactErrorsFailBuild: true
          artifacts: "~/zips/*"
          token: ${{ secrets.REPO_GITHUB_TOKEN }}
          tag: ${{ github.event.release.tag_name }}
          omitBodyDuringUpdate: true
          omitNameDuringUpdate: true

  publish_nuget:
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout"
        uses: "actions/checkout@v4"

      - name: "Setup .NET"
        uses: "actions/setup-dotnet@v4"
        with:
          dotnet-version: ${{ env.DOTNET_VERSIONS }}

      - name: Build
        run: dotnet build -c Release

      - name: Test
        run: dotnet test --no-build -c Release

      - name: Clean up
        run: dotnet clean -c Release

      - name: "Build Nuget Packages"
        run: |
          mkdir build
          cd ./Json2SharpLib
          dotnet build -p:PackageId=Json2Sharp -p:AssemblyName=Json2Sharp -c Release
          dotnet pack --include-symbols -p:SymbolPackageFormat=snupkg  -p:PackageId=Json2Sharp -p:AssemblyName=Json2Sharp -p:Version='${{ github.event.release.tag_name }}' -c Release -o ../build
          cd ..

      - name: "Publish Nuget Packages"
        run: "dotnet nuget push \"build/*\" -k ${{ secrets.NUGET_API_KEY }} -s https://api.nuget.org/v3/index.json"

      - name: "Upload Nuget Packages To Github Release"
        uses: "ncipollo/release-action@v1.14.0"
        with:
          allowUpdates: true
          artifactErrorsFailBuild: true
          artifacts: "build/*"
          token: ${{ secrets.REPO_GITHUB_TOKEN }}
          tag: ${{ github.event.release.tag_name }}
          omitBodyDuringUpdate: true
          omitNameDuringUpdate: true

  publish_cli:
    needs: publish_nuget
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout"
        uses: "actions/checkout@v4"

      - name: "Setup .NET"
        uses: "actions/setup-dotnet@v4"
        with:
          dotnet-version: ${{ env.DOTNET_VERSIONS }}

      - name: "Edit the Json2SharpApp.csproj file"
        run: |
          sed -i 's|<AssemblyName>.*</AssemblyName>|<AssemblyName>json2sharp-cli</AssemblyName>|g' ./Json2SharpApp/Json2SharpApp.csproj

      - name: "Create the package"
        run: |
          mkdir -p build-cli
          dotnet pack ./Json2SharpApp/Json2SharpApp.csproj -p:PublishTrimmed=false -p:PublishSingleFile=false -p:Version='${{ github.event.release.tag_name }}' -c Release -o build-cli

      - name: "Clean output folder"
        run: rm -f build-cli/Json2SharpLib*
  
      - name: "Upload the tool to NuGet"
        run: dotnet nuget push "build-cli/*" -k ${{ secrets.NUGET_API_KEY }} -s https://api.nuget.org/v3/index.json